name: Daily Tournament Scrape

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 3 AM UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN || secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run scrape
        run: npm run scrape
        
      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add src/data/tournaments.json src/data/geocoding_cache.json
          git commit -m "chore: nightly tournament scrape update" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/Simon-Gaspar/echecs-match.git
          git push origin HEAD:main
